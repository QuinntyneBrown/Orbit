<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Page / print setup ───────────────────────────────────────────────── */
    @page {
      size: A4;
      margin: 12mm 16mm;
    }

    html, body {
      width: 210mm;
      font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
      font-size: 10.5pt;
      line-height: 1.45;
      color: #1a1a1a;
      background: #ffffff;
    }

    /* ── Typography ───────────────────────────────────────────────────────── */
    h1 {
      font-size: 20pt;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #111111;
      margin-bottom: 2pt;
    }

    h2 {
      font-size: 11pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #2c2c2c;
      border-bottom: 1px solid #bbbbbb;
      padding-bottom: 2pt;
      margin-top: 10pt;
      margin-bottom: 5pt;
    }

    h3 {
      font-size: 10.5pt;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 6pt;
      margin-bottom: 1pt;
    }

    p {
      margin-bottom: 4pt;
    }

    /* ── Contact / header line ────────────────────────────────────────────── */
    p:first-of-type {
      font-size: 9.5pt;
      color: #444444;
      margin-bottom: 6pt;
    }

    /* ── Lists ────────────────────────────────────────────────────────────── */
    ul {
      padding-left: 14pt;
      margin-bottom: 4pt;
    }

    li {
      margin-bottom: 2pt;
    }

    /* ── Links ────────────────────────────────────────────────────────────── */
    a {
      color: #1a4a8a;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ── Page break control ───────────────────────────────────────────────── */
    h2 {
      page-break-after: avoid;
    }

    h3 {
      page-break-after: avoid;
    }

    li, p {
      page-break-inside: avoid;
    }

    /* ── Print overrides ──────────────────────────────────────────────────── */
    @media print {
      body {
        width: 100%;
      }

      a {
        color: #1a1a1a;
      }

      h2 {
        color: #000000;
        border-bottom-color: #888888;
      }
    }
  </style>
</head>
<body>
  {{CONTENT}}
</body>
</html>
